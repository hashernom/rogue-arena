name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-build:
    name: Lint, Type Check, and Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        
      - name: Build shared package (required for type check)
        run: |
          cd shared
          pnpm build
          echo "✅ Shared built. Listing dist:"
          ls -la dist/
          echo "✅ Checking types file:"
          cat dist/index.d.ts || echo "No index.d.ts"
        
      - name: Run ESLint
        run: pnpm lint
        
      - name: Run TypeScript type check (shared first)
        run: |
          cd shared && pnpm typecheck
          cd ../client && pnpm typecheck
          cd ../server && pnpm typecheck
        
      - name: Build all packages
        run: pnpm build